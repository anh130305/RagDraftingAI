version: "3.8"

services:
  DataBase:
    image: postgres:15-alpine
    container_name: rag_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    container_name: rag_fastapi_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./BACKEND:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - DataBase

  frontend:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
    container_name: rag_react_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./FRONTEND:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend

volumes:
  postgres_data:
